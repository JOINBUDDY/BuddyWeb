<!doctype html>
<html lang="en">
  <head>
    <!-- =========================================================
         Buddy — Base HTML Shell (Vite + React SPA)
         - Keep this minimal, correct, and stable.
         - Primary job: deliver metadata + mount React.
         ========================================================= -->

    <meta charset="UTF-8" />

    <!-- Mobile responsiveness (required) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- =========================================================
         Title + Description
         - Title appears in browser tabs + search results
         - Description powers SEO snippets + link previews
         - Updated to reflect Buddy as a "group ticket copilot"
         ========================================================= -->
    <title>Buddy | The Ticket Buying Copilot</title>
    <meta
      name="description"
      content="Buddy helps choose tickets faster using preference matching, transparent comparisons, and a Harmony Score—so everyone agrees before checkout."
    />

    <!-- =========================================================
         Canonical URL
         - Prevents duplicate content issues
         ========================================================= -->
    <link rel="canonical" href="https://ticketbuddy.org/" />

    <!-- =========================================================
         Favicons / App Icons
         - Keep your existing PNGs for now
         - Add more sizes/formats later as you brand polish
         ========================================================= -->
    <link rel="icon" type="image/png" href="/BuddyLogo.png" />
    <link rel="apple-touch-icon" href="/BuddyLogo.png" />

    <!-- Optional: If/when you add real favicon files -->
    <!--
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    -->

    <!-- =========================================================
         Theme Color (Mobile Browser UI color)
         - Influences Android Chrome toolbar color
         ========================================================= -->
    <meta name="theme-color" content="#000000" />

    <!-- =========================================================
         App / Browser Behavior Metadata (small polish)
         ========================================================= -->
    <meta name="application-name" content="Buddy" />
    <meta name="format-detection" content="telephone=no" />

    <!-- =========================================================
         Robots
         - Controls how search engines index your site
         - Keep "index,follow" for production
         - Switch to "noindex,nofollow" for staging
         ========================================================= -->
    <meta name="robots" content="index,follow" />

    <!-- =========================================================
         Open Graph (Facebook / LinkedIn / iMessage previews)
         - Updated copy to match Buddy's real value:
           group consensus + preference matching + comparison
         ========================================================= -->
    <meta property="og:site_name" content="Buddy" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:title" content="Buddy | The Ticket Buying Copilot" />
    <meta
      property="og:description"
      content="Compare tickets across sites, match friend preferences, and pick the best option together—with Harmony Score."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ticketbuddy.org/" />

    <!-- IMPORTANT:
         Make a proper OG image in /public
         Recommended: 1200x630 PNG/JPG named og.png -->
    <meta property="og:image" content="https://ticketbuddy.org/og.png" />
    <meta property="og:image:alt" content="Buddy — The Ticket Buying Copilot" />

    <!-- =========================================================
         Twitter / X Card Previews
         ========================================================= -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Buddy | The Ticket Buying Copilot" />
    <meta
      name="twitter:description"
      content="Compare tickets across sites, match friend preferences, and pick the best option together with Harmony Score."
    />
    <meta name="twitter:image" content="https://ticketbuddy.org/og.png" />

    <!-- =========================================================
         Performance: Preconnect (optional)
         - Only enable once you actually use these domains
         ========================================================= -->
    <!-- <link rel="preconnect" href="https://fonts.googleapis.com" /> -->
    <!-- <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin /> -->

    <!-- =========================================================
         Structured Data (JSON-LD)
         - Updated to reflect Buddy as software (not just a website)
         - More accurate than "WebSite + SearchAction" unless you
           truly have a /search route meant for indexing
         ========================================================= -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Buddy",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web",
        "url": "https://ticketbuddy.org/",
        "description": "Buddy helps groups choose tickets faster using preference matching, transparent comparisons, and a Harmony Score—so everyone agrees before checkout."
      }
    </script>
  </head>

  <body>
    <!-- =========================================================
         App Mount
         - React will render into this node
         ========================================================= -->
    <div id="root"></div>

    <!-- =========================================================
         Vite Entry Point
         ========================================================= -->
    <script type="module" src="/src/main.tsx"></script>

    <!-- =========================================================
         No-JS fallback (optional)
         - Helpful for accessibility + edge cases
         ========================================================= -->
    <noscript>
      Buddy requires JavaScript to run. Please enable JavaScript in your browser settings.
    </noscript>
  </body>
</html>
